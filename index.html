<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Shower Naila Victoria</title>
    <!-- Incluimos Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body {
            background-color: #ffeef2;
            font-family: 'Arial', sans-serif;
            text-align: center;
            color: #d65a7f;
            margin: 0;
            padding: 20px;
        }
        .contenedor {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(214, 90, 127, 0.15);
            border: 3px solid #ffcad4;
        }
        h1 {
            font-size: 26px;
            margin-bottom: 5px;
        }
        h2 {
            font-size: 16px;
            color: #aa4b6b;
            margin-bottom: 25px;
        }
        /* Contenedor de las 100 cajas */
        .grid-cajas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 12px;
            justify-items: center;
        }
        /* ESTILO DE LA CAJA ROSA (Como image_9c556e.png) */
        .caja-btn {
            background: none;
            border: none;
            position: relative;
            width: 85px;
            height: 95px;
            cursor: pointer;
            padding: 0;
            transition: transform 0.2s;
        }
        .caja-btn:hover {
            transform: scale(1.08);
        }
        .caja-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* NÚMERO ROSA EXACTAMENTE DENTRO DEL CORAZÓN */
        .caja-numero {
            position: absolute;
            bottom: 22px; 
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: bold;
            color: #e57399; /* Color Rosa Fuerte */
            text-shadow: 1px 1px 0px #fff; /* Sombra blanca para que resalte */
        }
        /* Cajas ya reservadas */
        .tomada {
            filter: grayscale(1) opacity(0.4);
            cursor: not-allowed;
        }
        .tomada-etiqueta {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            background: #d65a7f;
            color: white;
            font-size: 9px;
            padding: 1px 4px;
            border-radius: 8px;
            white-space: nowrap;
        }
        /* PANTALLA DE REVELACIÓN (Cuando desaparecen las otras 99) */
        .pantalla-ganador {
            display: none;
            animation: suaveEntrada 0.5s ease-out forwards;
            padding: 40px 10px;
        }
        .caja-ganadora-animada {
            position: relative;
            width: 160px;
            height: 180px;
            margin: 0 auto 30px auto;
            animation: abrirCajaEfecto 0.6s ease-in-out;
        }
        .regalo-bloque {
            font-size: 24px;
            font-weight: bold;
            color: #222;
            background: #fff0f3;
            padding: 20px;
            border-radius: 15px;
            border: 3px dashed #d65a7f;
            max-width: 450px;
            margin: 20px auto;
        }
        /* Animaciones */
        @keyframes suaveEntrada {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes abrirCajaEfecto {
            0% { transform: scale(1); }
            50% { transform: scale(1.3) rotate(-5deg); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="contenedor">
        
        <!-- SECCIÓN DEL TABLERO (Se borra al hacer clic) -->
        <div id="seccion-tablero">
            <h1>✨ ¡Elige una Cajita para Naila ! ✨</h1>
            <h2>Selecciona la caja que más te guste para descubrir tu regalo:</h2>
            <div class="grid-cajas" id="bloque-cajas"></div>
        </div>

        <!-- SECCIÓN DE TU CAJA SOLA (Aparece al hacer clic) -->
        <div id="seccion-ganador" class="pantalla-ganador">
            <h1 style="font-size: 36px; margin-bottom: 10px;">¡Felicidades! 🎉</h1>
            <h2 style="font-size: 18px;">Has abierto con éxito tu cajita seleccionada:</h2>
            
            <!-- Aquí se dibuja tu caja sola -->
            <div id="espacio-caja-sola"></div>
            
            <p style="font-size: 18px; color: #aa4b6b;">El regalo que te tocó llevar es:</p>
            <div class="regalo-bloque" id="texto-regalo-final"></div>
            
            <p style="color: #777; font-size: 14px; margin-top: 30px;">📸 Toma una captura de pantalla a este mensaje y guárdala para el día del evento. ¡Muchas gracias! 💕</p>
        </div>

    </div>

    <script>
        // CAMBIA ESTO por el nombre exacto de tu imagen en GitHub (ej: "cajita.png" o "image_9c556e.png")
        const NOMBRE_IMAGEN_ROSA = "image_9c556e.png"; 

        // CONFIGURACIÓN DE TU FIREBASE (Mantén tus datos reales aquí)
        const firebaseConfig = {
            apiKey: "TU_API_KEY_AQUÍ",
            authDomain: "baby-shower-de-naila-victoria.firebaseapp.com",
            projectId: "baby-shower-de-naila-victoria",
            storageBucket: "baby-shower-de-naila-victoria.appspot.com",
            messagingSenderId: "66949995186",
            appId: "TU_APP_ID_AQUÍ"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Cargar las 100 cajas desde Firebase
        function cargarTablero() {
            const contenedorCajas = document.getElementById('bloque-cajas');
            contenedorCajas.innerHTML = "";

            // Traemos las 100 cajas ordenadas de Firebase
            db.collection("cajitas").orderBy("combo").get().then((querySnapshot) => {
                querySnapshot.forEach((doc) => {
                    const datos = doc.data();
                    const numero = datos.combo;
                    const estaTomada = datos.reservado;

                    const boton = document.createElement('button');
                    boton.className = `caja-btn ${estaTomada ? 'tomada' : ''}`;
                    boton.disabled = estaTomada;

                    // Estructura idéntica a la foto: Imagen rosa + número rosa en el corazón
                    boton.innerHTML = `
                        <img src="${NOMBRE_IMAGEN_ROSA}" class="caja-img" alt="Caja ${numero}">
                        <div class="caja-numero">${numero}</div>
                        ${estaTomada ? '<div class="tomada-etiqueta">TOMADA 💕</div>' : ''}
                    `;

                    if (!estaTomada) {
                        boton.onclick = () => procesarEleccion(doc.id, numero, datos.regalo);
                    }

                    contenedorCajas.appendChild(boton);
                });
            });
        }

        // Esta función hace la magia que me pediste
        function procesarEleccion(docId, numero, regalo) {
            // Pedimos el nombre del invitado
            let nombreInvitado = prompt("Por favor, escribe tu Nombre y Apellido para apartar la caja:");
            if (!nombreInvitado || nombreInvitado.trim() === "") {
                alert("Debes poner tu nombre para abrir la cajita.");
                return;
            }
            nombreInvitado = nombreInvitado.trim();

            // Guardamos en Firebase que esa caja ya es de él
            db.collection("cajitas").doc(docId).update({
                invitado: nombreInvitado,
                reservado: true
            }).then(() => {
                
                // ¡AQUÍ SE BORRAN LAS OTRAS 99 CAJAS!
                document.getElementById('seccion-tablero').style.display = 'none';

                // Dibujamos únicamente SU caja elegida en grande
                document.getElementById('espacio-caja-sola').innerHTML = `
                    <div class="caja-ganadora-animada">
                        <img src="${NOMBRE_IMAGEN_ROSA}" style="width:100%; height:100%; object-fit:contain;">
                        <div class="caja-numero" style="font-size:32px; bottom:40px;">${numero}</div>
                    </div>
                `;

                // Ponemos el texto del regalo asignado
                document.getElementById('texto-regalo-final').innerText = `🎁 Caja #${numero}: ${regalo}`;

                // Mostramos la pantalla limpia del ganador
                document.getElementById('seccion-ganador').style.display = 'block';
            });
        }

        // Arranca el juego cargando las cajas
        cargarTablero();
    </script>
</body>
</html>
