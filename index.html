<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Baby Shower Naila 💕</title>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffe6f0;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      color: #ff4d88;
    }

    #invitacion {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffd1e6, #fff0f5);
    }

    #invitacion button {
      background: #ff4d88;
      color: white;
      border: none;
      padding: 15px 25px;
      border-radius: 20px;
      cursor: pointer;
    }

    #juego {
      display: none;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 10px;
      max-width: 600px;
      margin: auto;
    }

    .box {
      background: #fff;
      border: 2px solid #ff99bb;
      border-radius: 10px;
      padding: 15px;
      cursor: pointer;
      font-size: 12px;
      transition: 0.3s;
    }

    .box:hover {
      background: #ffccdd;
    }

    #login {
      margin-bottom: 20px;
    }

    #nombre {
      padding: 10px;
      border-radius: 10px;
      border: 2px solid #ff99bb;
      width: 200px;
      text-align: center;
    }

    button {
      background: #ff4d88;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- 🎀 INVITACIÓN -->
<div id="invitacion">
  <h1>🎀 Baby Shower de Naila 🎀</h1>
  <p>Estás invitada a una experiencia mágica 💕</p>
  <button onclick="entrar()">Entrar 💌</button>
</div>

<!-- 🎁 JUEGO -->
<div id="juego">

  <h1>🎀 Baby Shower Naila 🎀</h1>
  <p>Elige una cajita y descubre tu regalo 💝</p>

  <div id="login">
    <p>Escribe tu nombre 💕</p>
    <input type="text" id="nombre" placeholder="Tu nombre">
    <br><br>
    <button onclick="iniciarJuego()">Entrar 🎁</button>
  </div>

  <div class="grid" id="grid"></div>

</div>

<!-- 🔊 SONIDO -->
<audio id="sonido">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a4b1b1.mp3?filename=magic-coin-1-189817.mp3">
</audio>

<script>

const invitacion = document.getElementById("invitacion");
const juego = document.getElementById("juego");
const grid = document.getElementById("grid");
const login = document.getElementById("login");

let nombreJugador = localStorage.getItem("nombre") || "";
let abiertas = JSON.parse(localStorage.getItem("abiertas")) || {};

// 🎁 KITS ORGANIZADOS (100 cajitas reales con variedad)
let premios = [
  "🍼 Kit recién nacido: pañales + pañitos + tetero",
  "🍼 Kit higiene: pañitos + crema + jabón bebé",
  "🛁 Kit baño: tina + toalla + shampoo bebé",
  "👕 Kit ropa básica: 3 mudas + medias",
  "👕 Kit ropa completo: conjunto + gorro + babero",
  "🧸 Kit juguetes: peluche + sonajero + mordedor",
  "🧸 Kit estimulación: móvil + juguete + peluche",
  "🛏️ Kit descanso: cobija + sábana + manta",
  "🧴 Kit cuidado piel: crema + aceite + jabón",
  "🧦 Kit básico: medias + baberos + gorro",
  "👶 Kit hospital: salida + manta + gorrito",
  "🧺 Kit semanal ropa: 7 mudas de ropa",
  "🎀 Kit princesa: vestidito + gorro + cobija",
  "🍼 Kit alimentación: teteros + cepillo limpieza",
  "🛁 Kit baño completo: tina + toalla + shampoo",
  "🏆 Kit especial: coche de bebé 💖",
  "🏆 Kit lujo: cuna portátil + ropa + cobija",
  "🏆 Kit premium: canasta completa bebé 💎",
  "🧴 Kit higiene completo: pañitos + crema + jabón",
  "👕 Kit moda bebé: outfits + accesorios",
  "🧸 Kit diversión: juguetes + peluche + mordedor",
  "🛏️ Kit sueño: cobija + almohada + peluche",
  "🧦 Kit diario: medias + baberos",
  "🍼 Kit lactancia: tetero + limpiador",
  "🎁 Kit sorpresa especial 💝"
];

function entrar() {
  invitacion.style.display = "none";
  juego.style.display = "block";
}

function iniciarJuego() {
  const nombre = document.getElementById("nombre").value;

  if (nombre.trim() === "") {
    alert("Escribe tu nombre 💕");
    return;
  }

  nombreJugador = nombre;
  localStorage.setItem("nombre", nombreJugador);

  login.style.display = "none";

  crearCajitas();
}

function crearCajitas() {
  for (let i = 1; i <= 100; i++) {
    const box = document.createElement("div");
    box.classList.add("box");

    if (abiertas[i]) {
      box.innerText = abiertas[i].premio;
      box.style.background = "#ff4d88";
      box.style.color = "white";
      box.style.pointerEvents = "none";
    } else {
      box.innerText = "🎁";
    }

    box.addEventListener("click", () => {
      if (abiertas[i]) return;

      const premio = premios[Math.floor(Math.random() * premios.length)];

      box.innerText = premio;
      box.style.background = "#ff4d88";
      box.style.color = "white";
      box.style.pointerEvents = "none";

      document.getElementById("sonido").play();

      confetti({
        particleCount: 80,
        spread: 70,
        origin: { y: 0.6 }
      });

      abiertas[i] = {
        premio: premio,
        jugador: nombreJugador
      };

      localStorage.setItem("abiertas", JSON.stringify(abiertas));
    });

    grid.appendChild(box);
  }
}

// auto iniciar si ya hay usuario
if (nombreJugador) {
  invitacion.style.display = "none";
  juego.style.display = "block";
  login.style.display = "none";
  crearCajitas();
}

</script>

</body>
</html>
