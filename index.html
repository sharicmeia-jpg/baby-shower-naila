<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shower Naila 💕</title>

<!-- Confeti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- Firebase SDKs necesarios para Tiempo Real -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffe6f0;
  text-align: center;
  min-height: 100vh;
}

.contenedor-principal {
  display: flex;
  flex-direction: row;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
  background: linear-gradient(#ffd6e8, #fff0f5);
}

.seccion-bebe {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  background: rgba(255, 255, 255, 0.2);
  z-index: 2;
}

.bebe {
  width: 450px;
  max-width: 90%;
  height: auto;
  border-radius: 30px;
  box-shadow: 0 15px 30px rgba(0, 0, 0, .15);
}

.seccion-interfaz {
  flex: 1.2;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px;
  z-index: 2;
}

h1 { color: #ff4d88; font-size: 42px; margin-bottom: 5px; }
h2 { color: #ff7aa2; font-size: 26px; margin-top: 0; }
p { font-size: 18px; color: #666; }

button {
  background: #ff4d88;
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 15px;
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
  transition: background 0.2s;
}
button:hover { background: #e03973; }

#invitacion { display: flex; flex-direction: column; align-items: center; }
#juego { display: none; width: 100%; }

.caja-sorpresa-icono {
  font-size: 80px;
  margin: 20px 0;
  animation: bounce 2s infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

#login { margin-top: 20px; }
#nombre {
  padding: 12px;
  border: 2px solid #ff4d88;
  border-radius: 10px;
  font-size: 16px;
  text-align: center;
  outline: none;
}

.contenedor-grid {
  max-height: 55vh;
  overflow-y: auto;
  padding: 15px;
  background: rgba(255, 255, 255, 0.4);
  border-radius: 15px;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
  margin-top: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
  gap: 10px;
  max-width: 550px;
  margin: auto;
}

.box {
  background: #ffd6e8;
  border: 2px solid #ff4d88;
  padding: 15px 5px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  font-weight: bold;
  color: #ff4d88;
  transition: all 0.3s ease;
  box-shadow: 0 3px 6px rgba(255, 77, 136, 0.2);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 50px;
}
.box:hover {
  transform: scale(1.05);
  background: #ffb3d1;
}
.box.opened {
  background: #e2a0bb !important;
  color: #666 !important;
  border-color: #b58296;
  pointer-events: none;
  font-size: 10px;
}
.box.opening {
  transform: scale(1.2);
  background: #ff4d88;
  color: white;
}

.cloud {
  position: absolute;
  width: 120px;
  opacity: 0.3;
  animation: move 25s linear infinite;
  z-index: 1;
}
@keyframes move {
  from { transform: translateX(-200px); }
  to { transform: translateX(100vw); }
}

#panel {
  position: fixed;
  right: 15px;
  top: 15px;
  width: 260px;
  background: white;
  border: 2px solid #ff4d88;
  border-radius: 12px;
  padding: 15px;
  font-size: 13px;
  display: none;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  max-height: 80vh;
  overflow-y: auto;
  z-index: 10;
}
#registros div {
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px dashed #ffd6e8;
}

@media(max-width:900px){
  .contenedor-principal { flex-direction: column; }
  .seccion-bebe { flex: none; padding-top: 30px; }
  .bebe { width: 250px; }
  .seccion-interfaz { padding: 20px; flex: none; }
  h1 { font-size: 32px; }
  h2 { font-size: 20px; }
  .contenedor-grid { max-height: 40vh; }
}
</style>
</head>

<body>

<div class="contenedor-principal">
  <img class="cloud" style="top:20px; left:0;" src="https://cdn-icons-png.flaticon.com/512/414/414927.png">
  <img class="cloud" style="top:150px; left:-80px; animation-delay:5s;" src="https://cdn-icons-png.flaticon.com/512/414/414927.png">

  <div class="seccion-bebe">
    <img class="bebe" src="img/bebe.png" alt="Bebé Naila">
  </div>

  <div class="seccion-interfaz">
    
    <!-- PANTALLA 1: INVITACIÓN -->
    <div id="invitacion">
      <h1>🎀 Naila Victoria 🎀</h1>
      <h2>Te doy la bienvenida a mi Baby Shower 💕</h2>
      <p>Estás invitado/@ a una experiencia mágica ✨</p>
      <button onclick="entrar()">Entrar 💌</button>
    </div>

    <!-- PANTALLA 2: JUEGO -->
    <div id="juego">
      <h1>🎀 Naila Victoria 🎀</h1>
      
      <!-- Sub-pantalla A: Formulario de Nombre -->
      <div id="login">
        <p>Introduce tu nombre para empezar a jugar 👇</p>
        <div class="caja-sorpresa-icono">🎁</div>
        <input id="nombre" placeholder="Tu nombre completo" autocomplete="off">
        <br><br>
        <button onclick="iniciarJuego()">Entrar al Sorteo 🎁</button>
      </div>

      <!-- Sub-pantalla B: El tablero de las 100 cajas -->
      <div id="contenedor-tablero" style="display: none;">
        <p id="instruccion-juego">¡Elige una sola cajita sorpresa! 🎁</p>
        <div class="contenedor-grid">
          <div class="grid" id="grid"></div>
        </div>
      </div>

    </div>

  </div>
</div>

<!-- 📊 PANEL DE REGISTRO (Solo Admin visible vía URL) -->
<div id="panel">
  <h3 style="color:#ff4d88; margin-top:0;">📊 Registro de Premios</h3>
  <div id="registros"></div>
</div>

<audio id="sonido">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a4b1b1.mp3">
</audio>

<script>
// 💾 CONFIGURACIÓN EXACTA DE TU FIREBASE (image_9d36d0.png)
const firebaseConfig = {
  apiKey: "AIzaSyANucv8E4VBviYnoRuidfKy61Hp9UlZLYw",
  authDomain: "baby-shower-de-naila-victoria.firebaseapp.com",
  projectId: "baby-shower-de-naila-victoria",
  storageBucket: "baby-shower-de-naila-victoria.firebasestorage.app",
  messagingSenderId: "66949995186",
  appId: "1:66949995186:web:636053a41390012f1987ab",
  measurementId: "G-L2DMEPNNLW"
};

// Inicializar Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const invitacion = document.getElementById("invitacion");
const juego = document.getElementById("juego");
const loginSection = document.getElementById("login");
const tableroSection = document.getElementById("contenedor-tablero");
const grid = document.getElementById("grid");
const panel = document.getElementById("panel");
const registros = document.getElementById("registros");

let nombre = "";
let abiertas = {}; 
let yaJugo = false;

const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('admin') === 'true') {
  panel.style.display = "block";
}

let premios = [
  "🍼 Pañales + pañitos + tetero", "🛁 Kit baño bebé", "👕 Ropa bebé", 
  "🧸 Juguetes", "🛏️ Cobija suave", "🧴 Aseo bebé", "🎀 Set ropa", 
  "🧦 Medias + baberos", "👶 Kit recién nacido", "🏆 Coche bebé", "🏆 Cuna bebé"
];

function entrar() {
  invitacion.style.display = "none";
  juego.style.display = "block";
}

function iniciarJuego() {
  nombre = document.getElementById("nombre").value.trim();
  if (nombre === "") return alert("Por favor, escribe tu nombre para continuar.");
  
  loginSection.style.display = "none";
  tableroSection.style.display = "block";
  
  escucharCajas();
}

function escucharCajas() {
  // 🔗 Conectado exactamente a tu colección real "cajitas" (image_9d42a9.png)
  db.collection("cajitas").doc("cajasOpen").onSnapshot((doc) => {
    if (doc.exists) {
      abiertas = doc.data();
    } else {
      abiertas = {};
    }
    dibujarTablero();
    actualizarPanel();
  });
}

function dibujarTablero() {
  grid.innerHTML = "";
  
  yaJugo = Object.values(abiertas).some(caja => caja.nombre.toLowerCase() === nombre.toLowerCase());
  if(yaJugo) {
    document.getElementById("instruccion-juego").innerHTML = "¡Ya elegiste tu regalo! Gracias por participar 💕";
  }

  for (let i = 1; i <= 100; i++) {
    let box = document.createElement("div");
    box.classList.add("box");

    if (abiertas[i]) {
      if (abiertas[i].nombre.toLowerCase() === nombre.toLowerCase()) {
        box.innerHTML = `⭐ ¡Tu premio!<br><b>${abiertas[i].premio}</b>`;
        box.style.background = "#ff4d88";
        box.style.color = "white";
      } else {
        box.innerHTML = `❌<br>Tomada por<br>${abiertas[i].nombre}`;
        box.classList.add("opened");
      }
    } else {
      box.innerText = `🎁 ${i}`;
      
      if (!yaJugo) {
        box.onclick = () => abrirCaja(i, box);
      } else {
        box.style.cursor = "default";
      }
    }
    grid.appendChild(box);
  }
}

function abrirCaja(numero, elementoBox) {
  elementoBox.classList.add("opening");

  setTimeout(() => {
    const premioElegido = premios[Math.floor(Math.random() * premios.length)];

    document.getElementById("sonido").play().catch(()=>{});
    confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 } });

    // Guardado directo en tu colección "cajitas" en la nube
    db.collection("cajitas").doc("cajasOpen").set({
      [numero]: { nombre: nombre, premio: premioElegido }
    }, { merge: true });

  }, 700);
}

function actualizarPanel() {
  registros.innerHTML = "";
  Object.keys(abiertas).forEach(k => {
    let d = document.createElement("div");
    d.innerHTML = `<strong>Caja ${k}</strong><br>👤 ${abiertas[k].nombre}<br>🏆 ${abiertas[k].premio}`;
    registros.appendChild(d);
  });
}
</script>

</body>
</html>
