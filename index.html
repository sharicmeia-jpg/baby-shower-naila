<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Baby Shower Naila 💕</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#ffe6f0;
  text-align:center;
  position:relative;
}

/* 🎀 INVITACIÓN */
#invitacion{
    min-height:100vh;
    display:flex;
    flex-direction:row;
    justify-content:space-evenly;
    align-items:center;
    gap:100px;
    flex-wrap:wrap;
    background:linear-gradient(#ffd6e8,#fff0f5);
    padding:40px;
    box-sizing:border-box;
    overflow:hidden;
}
.bebe{
    width:500px;
    max-width:90%;
    height:auto;
    display:block;
    border-radius:30px;
    box-shadow:0 15px 30px rgba(0,0,0,.2);
}

h1 {
color:#ff4d88;
}

button {
background:#ff4d88;
color:white;
border:none;
padding:12px 20px;
border-radius:15px;
cursor:pointer;
}
/* 🧸 bebé */
.contenido{
    max-width:500px;
    text-align:left;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.contenido h1{
  font-size:50px;
  color:#ff4d88;
}

.contenido p{
  font-size:22px;
  color:#666;
  margin:20px 0;
  line-height:1.5;
}

.contenido button{
  padding:15px 30px;
  font-size:20px;
}
.contenido h2{
  font-size:30px;
  color:#ff7aa2;
  margin:10px 0 20px 0;
}
/* ☁️ nubes */
.cloud {
  position:absolute;
  width:120px;
  opacity:0.5;
  animation:move 25s linear infinite;
}

@keyframes move {
  from {transform:translateX(-200px);}
  to {transform:translateX(120%);}
}

/* 🎁 juego */
#juego { display:none; padding:20px; }

.grid {
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:8px;
  max-width:600px;
  margin:auto;
}

.box {
  background:white;
  border:2px solid #ff99bb;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  font-size:11px;
  transition:all 0.3s ease;
}

.box.opening {
  transform:scale(1.2);
  background:#ffb3d1;
}

/* 📊 panel */
#panel {
  position:fixed;
  right:10px;
  top:10px;
  width:260px;
  background:white;
  border:2px solid #ff4d88;
  padding:10px;
  font-size:12px;
  display:none;
}

/* 📱 Diseño para celular */
@media(max-width:900px){

  #invitacion{
    flex-direction:column;
    gap:30px;
    text-align:center;
  }

  .contenido{
    text-align:center;
  }

  .contenido h1{
    font-size:38px;
  }

  .contenido p{
    font-size:20px;
  }

  .bebe{
    width:320px;
    max-width:90%;
  }

}
</style>
</head>

<body>

<!-- 🎀 INVITACIÓN -->
<div id="invitacion">

<!-- ☁️ nubes -->
<img class="cloud" style="top:20px;left:0"
src="https://cdn-icons-png.flaticon.com/512/414/414927.png">

<img class="cloud" style="top:120px;left:-80px;animation-delay:5s"
src="https://cdn-icons-png.flaticon.com/512/414/414927.png">

<!-- 🧸 BEBÉ -->

  <img class="bebe" src="img/bebe.png">

  <div class="contenido">
    <h1>🎀 Naila Victoria 🎀</h1>
    <h2>Te doy la bienvenida a mi Baby Shower 💕</h2>
    <p>Estás invitado/@ a una experiencia mágica ✨</p>
    <button onclick="entrar()">Entrar 💌</button>
  </div>

</div>

<!-- 🎁 JUEGO -->
<div id="juego">

<h1>🎀 Baby Shower Naila 🎀</h1>

<div id="login">
<input id="nombre" placeholder="Tu nombre">
<br><br>
<button onclick="iniciarJuego()">Entrar 🎁</button>
</div>

<div class="grid" id="grid"></div>
</div>

<!-- 📊 PANEL -->
<div id="panel">
<h3>📊 Registro</h3>
<div id="registros"></div>
</div>

<!-- 🔊 SONIDO -->
<audio id="sonido">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a4b1b1.mp3">
</audio>

<script>

const invitacion=document.getElementById("invitacion");
const juego=document.getElementById("juego");
const grid=document.getElementById("grid");
const panel=document.getElementById("panel");
const registros=document.getElementById("registros");

let nombre="";
let abiertas=JSON.parse(localStorage.getItem("abiertas"))||{};

let premios=[
"🍼 Pañales + pañitos + tetero",
"🛁 Kit baño bebé",
"👕 Ropa bebé",
"🧸 Juguetes",
"🛏️ Cobija suave",
"🧴 Aseo bebé",
"🎀 Set ropa",
"🧦 Medias + baberos",
"👶 Kit recién nacido",
"🏆 Coche bebé",
"🏆 Cuna bebé"
];

function entrar(){
invitacion.style.display="none";
juego.style.display="block";
panel.style.display="block";
}

function iniciarJuego(){
nombre=document.getElementById("nombre").value;
if(nombre==="") return alert("Escribe tu nombre");
crearCajitas();
}

function crearCajitas(){
for(let i=1;i<=100;i++){
let box=document.createElement("div");
box.classList.add("box");

if(abiertas[i]){
box.innerText=abiertas[i].premio;
box.style.background="#ff4d88";
box.style.color="white";
box.style.pointerEvents="none";
}

box.onclick=()=>{

if(abiertas[i]) return;

box.classList.add("opening");

setTimeout(()=>{

const premio=premios[Math.floor(Math.random()*premios.length)];

box.innerText=premio;
box.style.background="#ff4d88";
box.style.color="white";
box.style.pointerEvents="none";

document.getElementById("sonido").play();

confetti({
particleCount:80,
spread:70,
origin:{y:0.6}
});

abiertas[i]={nombre,premio};

localStorage.setItem("abiertas",JSON.stringify(abiertas));

actualizarPanel();

box.classList.remove("opening");

},700);
};

grid.appendChild(box);
}
}

function actualizarPanel(){
registros.innerHTML="";
Object.keys(abiertas).forEach(k=>{
let d=document.createElement("div");
d.innerHTML=`🎁 Caja ${k}<br>👤 ${abiertas[k].nombre}<br>🏆 ${abiertas[k].premio}`;
registros.appendChild(d);
});
}

</script>

</body>
</html>
