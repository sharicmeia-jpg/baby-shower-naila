<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baby Shower Naila 💕</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ffe6f0;
  text-align: center;
}

/* 🎀 INVITACIÓN */
#invitacion {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  background: linear-gradient(#ffd6e8, #fff0f5);
  position: relative;
  overflow: hidden;
}

/* ☁️ nubes */
.cloud {
  position: absolute;
  width: 120px;
  opacity: 0.5;
  animation: move 25s linear infinite;
}

@keyframes move {
  from {transform: translateX(-200px);}
  to {transform: translateX(120%);}
}

h1 { color:#ff4d88; }

button {
  background:#ff4d88;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:15px;
  cursor:pointer;
}

/* 🧸 imagen bebé */
.bebe {
  width:180px;
  border-radius:20px;
  margin-bottom:10px;
}

/* 🎁 juego */
#juego { display:none; padding:20px; }

.grid {
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:8px;
  max-width:600px;
  margin:auto;
}

.box {
  background:white;
  border:2px solid #ff99bb;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

/* 📊 panel */
#panel {
  position:fixed;
  right:10px;
  top:10px;
  width:250px;
  background:white;
  border:2px solid #ff4d88;
  padding:10px;
  font-size:12px;
  display:none;
}
</style>
</head>

<body>

<!-- 🎀 INVITACIÓN -->
<div id="invitacion">

  <!-- ☁️ nubes -->
  <img class="cloud" style="top:20px; left:0;"
  src="https://cdn-icons-png.flaticon.com/512/414/414927.png">

  <img class="cloud" style="top:120px; left:-100px; animation-delay:5s;"
  src="https://cdn-icons-png.flaticon.com/512/414/414927.png">

  <!-- 🧸 bebé con oso -->
  <img class="bebe"
  src="https://i.imgur.com/3ZQ3ZQb.png">

  <h1>🎀 Baby Shower de Naila 🎀</h1>
  <p>Estás invitada a una experiencia mágica 💕</p>

  <button onclick="entrar()">Entrar 💌</button>
</div>

<!-- 🎁 JUEGO -->
<div id="juego">

<h1>🎀 Baby Shower Naila 🎀</h1>

<div id="login">
<input id="nombre" placeholder="Tu nombre">
<br><br>
<button onclick="iniciarJuego()">Entrar 🎁</button>
</div>

<div class="grid" id="grid"></div>

</div>

<!-- 📊 PANEL -->
<div id="panel">
<h3>📊 Registro</h3>
<div id="registros"></div>
</div>

<!-- 🔊 SONIDO -->
<audio id="sonido">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a4b1b1.mp3">
</audio>

<script>

const invitacion=document.getElementById("invitacion");
const juego=document.getElementById("juego");
const grid=document.getElementById("grid");
const panel=document.getElementById("panel");
const registros=document.getElementById("registros");

let nombre="";
let abiertas=JSON.parse(localStorage.getItem("abiertas"))||{};

let premios=[
"🍼 Kit pañales",
"🛁 Kit baño",
"👕 Ropa bebé",
"🧸 Juguetes",
"🛏️ Cobija",
"🧴 Aseo bebé",
"🎀 Set ropa",
"🏆 Coche bebé",
"🏆 Cuna bebé"
];

function entrar(){
invitacion.style.display="none";
juego.style.display="block";
panel.style.display="block";
}

function iniciarJuego(){
nombre=document.getElementById("nombre").value;
if(nombre==="") return alert("Escribe tu nombre");
crear();
}

function crear(){
for(let i=1;i<=100;i++){
let box=document.createElement("div");
box.classList.add("box");

if(abiertas[i]){
box.innerText="🎁";
box.style.background="#ddd";
box.style.pointerEvents="none";
}

box.onclick=()=>{

if(abiertas[i])return;

let premio=premios[Math.floor(Math.random()*premios.length)];

box.innerText="✔";

confetti({particleCount:80,spread:70,origin:{y:0.6}});
document.getElementById("sonido").play();

abiertas[i]={
nombre,
premio
};

localStorage.setItem("abiertas",JSON.stringify(abiertas));

actualizar();
};

grid.appendChild(box);
}
}

function actualizar(){
registros.innerHTML="";
Object.keys(abiertas).forEach(k=>{
let d=document.createElement("div");
d.innerHTML=`🎁 Caja ${k}<br>👤 ${abiertas[k].nombre}<br>🏆 ${abiertas[k].premio}`;
registros.appendChild(d);
});
}

</script>

</body>
</html>
