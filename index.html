<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Baby Shower Naila 💕</title>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffe6f0;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      color: #ff4d88;
    }

    /* 🎀 PANTALLA INVITACIÓN */
    #invitacion {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffd1e6, #fff0f5);
      animation: fadeIn 1.5s ease-in-out;
    }

    #invitacion h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    #invitacion p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    #invitacion button {
      background: #ff4d88;
      color: white;
      border: none;
      padding: 15px 25px;
      border-radius: 20px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    #invitacion button:hover {
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    /* 🎁 JUEGO */
    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 10px;
      max-width: 500px;
      margin: auto;
    }

    .box {
      background: #fff;
      border: 2px solid #ff99bb;
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    .box:hover {
      background: #ffccdd;
    }

    #login {
      margin-bottom: 20px;
    }

    #nombre {
      padding: 10px;
      border-radius: 10px;
      border: 2px solid #ff99bb;
      width: 200px;
      text-align: center;
    }

    button {
      background: #ff4d88;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
    }

    #juego {
      display: none;
      padding: 20px;
    }
  </style>
</head>

<body>

<!-- 🎀 INVITACIÓN -->
<div id="invitacion">
  <h1>🎀 Baby Shower de Naila 🎀</h1>
  <p>Estás invitada a una experiencia mágica 💕</p>
  <button onclick="entrar()">Entrar 💌</button>
</div>

<!-- 🎁 JUEGO -->
<div id="juego">

  <h1>🎀 Baby Shower Naila 🎀</h1>
  <p>Elige una cajita y descubre tu sorpresa 💝</p>

  <div id="login">
    <h2>Escribe tu nombre 💕</h2>
    <input type="text" id="nombre" placeholder="Tu nombre aquí">
    <br><br>
    <button onclick="iniciarJuego()">Entrar 🎁</button>
  </div>

  <div class="grid" id="grid"></div>

</div>

<audio id="sonido">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a4b1b1.mp3?filename=magic-coin-1-189817.mp3">
</audio>

<script>
const invitacion = document.getElementById("invitacion");
const juego = document.getElementById("juego");
const grid = document.getElementById("grid");
const login = document.getElementById("login");

const premios = ["🧸", "🍼", "🎀", "🍭", "💝", "🧁", "🎈", "👶"];

let abiertas = JSON.parse(localStorage.getItem("abiertas")) || {};
let nombreJugador = localStorage.getItem("nombre") || "";

function entrar() {
  invitacion.style.display = "none";
  juego.style.display = "block";
}

function iniciarJuego() {
  const nombre = document.getElementById("nombre").value;

  if (nombre.trim() === "") {
    alert("Escribe tu nombre 💕");
    return;
  }

  nombreJugador = nombre;
  localStorage.setItem("nombre", nombreJugador);

  login.style.display = "none";

  crearCajitas();
}

function crearCajitas() {
  if (!nombreJugador) return;

  for (let i = 1; i <= 100; i++) {
    const box = document.createElement("div");
    box.classList.add("box");

    if (abiertas[i]) {
      box.innerText = abiertas[i].premio;
      box.style.background = "#ff4d88";
      box.style.color = "white";
      box.style.pointerEvents = "none";
    } else {
      box.innerText = "🎁";
    }

    box.addEventListener("click", () => {
      if (abiertas[i]) return;

      let premio;

      if (Math.random() < 0.1) {
        premio = "🏆 PREMIO ESPECIAL NAILA 💖";
      } else {
        premio = premios[Math.floor(Math.random() * premios.length)];
      }

      box.innerText = premio;
      box.style.background = "#ff4d88";
      box.style.color = "white";
      box.style.pointerEvents = "none";

      document.getElementById("sonido").play();

      confetti({
        particleCount: 80,
        spread: 70,
        origin: { y: 0.6 }
      });

      abiertas[i] = {
        premio: premio,
        jugador: nombreJugador
      };

      localStorage.setItem("abiertas", JSON.stringify(abiertas));
    });

    grid.appendChild(box);
  }
}

if (nombreJugador) {
  entrar();
  login.style.display = "none";
  crearCajitas();
}
</script>

</body>
</html>
