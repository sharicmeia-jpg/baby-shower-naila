<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Baby Shower Naila 💕</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffe6f0;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #ff4d88;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 10px;
      max-width: 500px;
      margin: auto;
    }

    .box {
      background: #fff;
      border: 2px solid #ff99bb;
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    .box:hover {
      background: #ffccdd;
    }

    #login {
      margin-bottom: 20px;
    }

    #nombre {
      padding: 10px;
      border-radius: 10px;
      border: 2px solid #ff99bb;
      width: 200px;
      text-align: center;
    }

    button {
      background: #ff4d88;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>🎀 Baby Shower Naila 🎀</h1>
  <p>Elige una cajita y descubre tu sorpresa 💝</p>

  <!-- LOGIN -->
  <div id="login">
    <h2>🎀 Bienvenida al Baby Shower de Naila 🎀</h2>
    <p>Escribe tu nombre para empezar 💕</p>

    <input type="text" id="nombre" placeholder="Tu nombre aquí">
    <br><br>
    <button onclick="iniciarJuego()">Entrar 🎁</button>
  </div>

  <!-- JUEGO -->
  <div class="grid" id="grid"></div>

  <script>
    const grid = document.getElementById("grid");
    const login = document.getElementById("login");

    const premios = ["🧸", "🍼", "🎀", "🍭", "💝", "🧁", "🎈", "👶"];

    let abiertas = JSON.parse(localStorage.getItem("abiertas")) || {};
    let nombreJugador = localStorage.getItem("nombre") || "";

    grid.style.display = "none";

    function iniciarJuego() {
      const nombre = document.getElementById("nombre").value;

      if (nombre.trim() === "") {
        alert("Escribe tu nombre 💕");
        return;
      }

      nombreJugador = nombre;
      localStorage.setItem("nombre", nombreJugador);

      login.style.display = "none";
      grid.style.display = "grid";

      crearCajitas();
    }

    function crearCajitas() {
      for (let i = 1; i <= 100; i++) {
        const box = document.createElement("div");
        box.classList.add("box");

        if (abiertas[i]) {
          box.innerText = abiertas[i].premio;
          box.style.background = "#ff4d88";
          box.style.color = "white";
          box.style.pointerEvents = "none";
        } else {
          box.innerText = "🎁";
        }

        box.addEventListener("click", () => {
          if (abiertas[i]) return;

          const premio = premios[Math.floor(Math.random() * premios.length)];

          box.innerText = premio;
          box.style.background = "#ff4d88";
          box.style.color = "white";
          box.style.pointerEvents = "none";

          abiertas[i] = {
            premio: premio,
            jugador: nombreJugador
          };

          localStorage.setItem("abiertas", JSON.stringify(abiertas));
        });

        grid.appendChild(box);
      }
    }

    // si ya hay usuario guardado
    if (nombreJugador) {
      login.style.display = "none";
      grid.style.display = "grid";
      crearCajitas();
    }
  </script>

</body>
</html>
