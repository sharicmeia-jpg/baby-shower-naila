<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Shower Naila Victoria</title>
    <style>
        body {
            background-color: #ffeef2;
            font-family: 'Arial', sans-serif;
            text-align: center;
            color: #d65a7f;
            margin: 0;
            padding: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }
        /* Contenedor de la caja usando tu imagen base */
        .caja-btn {
            background: none;
            border: none;
            position: relative;
            width: 100px;
            height: 110px;
            cursor: pointer;
            padding: 0;
            transition: transform 0.2s;
        }
        .caja-btn:hover {
            transform: scale(1.05);
        }
        /* Imagen de fondo de la cajita (como image_9c556e.png) */
        .caja-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* Número rosa colocado exactamente sobre el corazón */
        .caja-numero {
            position: absolute;
            bottom: 24px; /* Ajusta esta altura si tu imagen real es distinta */
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
            color: #e57399; /* Color Rosa de la imagen */
            text-shadow: 1px 1px 0px #fff;
        }
        .tomada {
            filter: grayscale(1) opacity(0.6);
            cursor: not-allowed;
        }
        .tomada-etiqueta {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            background: #d65a7f;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            white-space: nowrap;
        }
        /* Pantalla modal para cuando abre la cajita */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 238, 242, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-contenido {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(214, 90, 127, 0.2);
            max-width: 400px;
            width: 80%;
            text-align: center;
            border: 3px solid #ffcad4;
        }
        .modal-contenido h2 {
            color: #d65a7f;
            margin-top: 0;
        }
        .regalo-texto {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
            background: #fff0f3;
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed #d65a7f;
        }
        .btn-cerrar {
            background: #d65a7f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>✨ ¡Elige una Cajita para Naila ! ✨</h1>
    
    <div class="grid-container" id="tablero"></div>

    <!-- Ventana Emergente (Sola la caja elegida y su regalo) -->
    <div class="modal" id="modalRegalo">
        <div class="modal-contenido">
            <h2>¡Felicidades! 🎉</h2>
            <p>Has abierto la cajita número <span id="numCajaModal"></span></p>
            <div id="cajaVisualModal"></div>
            <p>El regalo que te tocó llevar es:</p>
            <div class="regalo-texto" id="textoRegaloModal"></div>
            <button class="btn-cerrar" onclick="cerrarModal()">¡Genial, gracias!</button>
        </div>
    </div>

    <script>
        // Cambia este link por la URL real de tu imagen de la cajita (image_9c556e.png)
        const URL_IMAGEN_CAJA = "cajita-rosa.png"; 

        // Simulación de regalos de la base de datos
        const regalos = [
            "Kit de aseo + pañitos + pañales", "Pañales Etapa 1", "Ropita de bebé", 
            "Biberón y teteros", "Cobijita suave", "Toalla con capucha"
        ];

        function dibujarTablero() {
            const tablero = document.getElementById('tablero');
            tablero.innerHTML = "";

            for (let i = 1; i <= 16; i++) {
                // Aquí simulamos si de la 5 en adelante ya están tomadas como en watermarked_img_5911019599203181824.png
                let estaTomada = i >= 5 && i !== 7 && i !== 8 && i !== 12 && i !== 13 && i !== 15; 

                const boton = document.createElement('button');
                boton.className = `caja-btn ${estaTomada ? 'tomada' : ''}`;
                boton.disabled = estaTomada;
                
                // Estructura idéntica a tu diseño: Imagen + Número rosa en el corazón
                boton.innerHTML = `
                    <img src="${URL_IMAGEN_CAJA}" class="caja-img" alt="Caja ${i}">
                    <div class="caja-numero">${i}</div>
                    ${estaTomada ? '<div class="tomada-etiqueta">TOMADA 💕</div>' : ''}
                `;

                if (!estaTomada) {
                    boton.onclick = () => abrirCajita(i);
                }

                tablero.appendChild(boton);
            }
        }

        function abrirCajita(numero) {
            // Selecciona un regalo de la lista
            const regaloAsignado = regalos[(numero - 1) % regalos.length];

            // Llena los datos en la ventana emergente aislada
            document.getElementById('numCajaModal').innerText = numero;
            document.getElementById('textoRegaloModal').innerText = `🎁 ${regaloAsignado}`;
            
            // Muestra la caja seleccionada sola adentro del modal
            document.getElementById('cajaVisualModal').innerHTML = `
                <div style="position:relative; width:80px; margin:0 auto; transform: scale(1.2); margin-bottom:15px;">
                    <img src="${URL_IMAGEN_CAJA}" style="width:100%;">
                    <div style="position:absolute; bottom:18px; left:50%; transform:translateX(-50%); font-weight:bold; color:#e57399;">${numero}</div>
                </div>
            `;

            // Abre la pantalla de felicitación
            document.getElementById('modalRegalo').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modalRegalo').style.display = 'none';
            // Aquí puedes recargar o bloquear el juego para que no jueguen más
            alert("¡Tu regalo ha sido registrado! Muchas gracias.");
        }

        // Inicia el tablero al cargar
        dibujarTablero();
    </script>
</body>
</html>
