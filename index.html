<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Baby Shower Naila 💕</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffe6f0;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #ff4d88;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 10px;
      max-width: 500px;
      margin: auto;
    }

    .box {
      background: #fff;
      border: 2px solid #ff99bb;
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    .box:hover {
      background: #ffccdd;
    }
  </style>
</head>

<body>

  <h1>🎀 Baby Shower Naila 🎀</h1>
  <p>Elige una cajita y descubre tu sorpresa 💝</p>

  <div class="grid" id="grid"></div>

  <script>
    const grid = document.getElementById("grid");

    for (let i = 1; i <= 100; i++) {
      const box = document.createElement("div");
      box.classList.add("box");
      box.innerText = "🎁";

      box.addEventListener("click", () => {
        box.innerText = "💖";
        box.style.background = "#ff4d88";
        box.style.color = "white";
        box.style.pointerEvents = "none";
      });

      grid.appendChild(box);
    }
  </script>

</body>
</html>
